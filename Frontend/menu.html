<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery App - Menu</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">Foodie</a>
        <div class="nav-links">

            <a href="cart.html">Cart</a>

    <div class="container">

            <input type="text" id="search-food" class="form-control" style="max-width: 300px;"
