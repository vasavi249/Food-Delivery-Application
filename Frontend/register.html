<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery App - Register</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Auth specific overrides */
        body {
            background-color: var(--white);
            display: block;
        }
        .auth-container {
            display: flex;
            min-height: 100vh;
        }
        .auth-image {
            flex: 1;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.2)), url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=1000&q=80') center/cover no-repeat;
            display: none;
        }
        .auth-form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }
        .auth-nav {
            position: absolute;
            top: 20px;
            left: 40px;
        }
        .auth-nav .logo {
            font-size: 2rem;
        }
        .auth-card {
            width: 100%;
            max-width: 500px;
            padding: 2.5rem 3rem;
            border-radius: 20px;
            background: var(--white);
            box-shadow: 0 15px 50px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }
        .auth-card h2 {
            text-align: center;
            font-size: 2.2rem;
            color: var(--secondary);
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .form-control {
            background: #f9f9f9;
            border-color: #eee;
            padding: 0.8rem 1.2rem;
        }
        .form-control:focus {
            background: var(--white);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(226, 55, 68, 0.1);
        }
        .auth-card .btn-primary {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            margin-top: 1rem;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .col {
            flex: 1;
        }
        @media (min-width: 900px) {
            .auth-image {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div id="loading-spinner" class="spinner"></div>
    <div id="toast-container"></div>
    
    <div class="auth-container">
        <div class="auth-image"></div>
        <div class="auth-form-section">
            <div class="auth-nav">
                <a href="index.html" class="logo">Foodie</a>
            </div>
            
            <div class="auth-card">
                <h2>Create Account</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="full_name" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="row">
                        <div class="form-group col">
                            <label>Email</label>
                            <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="form-group col">
                            <label>Phone</label>
                            <input type="text" id="phone" class="form-control" placeholder="9876543210" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="form-group col">
                            <label>Address</label>
                            <input type="text" id="address" class="form-control" placeholder="Street name" required>
                        </div>
                        <div class="form-group col">
                            <label>City</label>
                            <input type="text" id="city" class="form-control" placeholder="City" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </form>
                <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                    Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
