<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery App - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Auth specific overrides */
        body {
            background-color: var(--white);
            display: block;
        }
        .auth-container {
            display: flex;
            min-height: 100vh;
        }
        .auth-image {
            flex: 1;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1000&q=80') center/cover no-repeat;
            display: none;
        }
        .auth-form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }
        .auth-nav {
            position: absolute;
            top: 20px;
            left: 40px;
        }
        .auth-nav .logo {
            font-size: 2rem;
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 3rem;
            border-radius: 20px;
            background: var(--white);
            box-shadow: 0 15px 50px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }
        .auth-card h2 {
            text-align: center;
            font-size: 2.2rem;
            color: var(--secondary);
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }
        .form-group label {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .form-control {
            background: #f9f9f9;
            border-color: #eee;
            padding: 0.9rem 1.2rem;
        }
        .form-control:focus {
            background: var(--white);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(226, 55, 68, 0.1);
        }
        .auth-card .btn-primary {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            margin-top: 1rem;
        }
        @media (min-width: 900px) {
            .auth-image {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    
    <div class="auth-container">
        <div class="auth-image"></div>
        <div class="auth-form-section">
            <div class="auth-nav">
                <a href="index.html" class="logo">Foodie</a>
            </div>
            
            <div class="auth-card">
                <h2>Welcome Back</h2>
                <form onsubmit="event.preventDefault(); window.location.href='index.html'; showToast('Logged in successfully!');">
                    <div class="form-group" style="margin-bottom: 1.2rem;">
                        <label>Email Address</label>
                        <input type="email" class="form-control" required placeholder="name@example.com">
                    </div>
                    <div class="form-group" style="margin-bottom: 1.2rem;">
                        <label>Password</label>
                        <input type="password" class="form-control" required placeholder="••••••••">
                    </div>
                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="remember" style="accent-color: var(--primary); width: 16px; height: 16px;">
                            <label for="remember" style="margin: 0; cursor: pointer;">Remember Me</label>
                        </div>
                        <a href="#" style="font-size: 0.9rem; color: var(--primary); text-decoration: none; font-weight: 500;">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </form>
                <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
                    New to Foodie? <a href="register.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create account</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
